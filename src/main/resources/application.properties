# ── HTTP Server ────────────────────────────────────────────────────────────────
quarkus.http.port=${QUARKUS_HTTP_PORT:8080}

# ── OIDC / JWT Validation ──────────────────────────────────────────────────────
# Full Keycloak realm URL, e.g. http://localhost:8180/realms/mcp-demo
quarkus.oidc.auth-server-url=${ISSUER_URL:http://localhost:8180/realms/mcp-demo}
quarkus.oidc.application-type=service

# Strict audience validation — token must contain EXPECTED_AUDIENCE in its "aud" claim
quarkus.oidc.token.audience=${EXPECTED_AUDIENCE:http://localhost:8080/mcp}

# ── Path-based Access Control ──────────────────────────────────────────────────
# All /mcp/* paths require a valid bearer token; everything else is public.
quarkus.http.auth.permission.authenticated.paths=/mcp/*
quarkus.http.auth.permission.authenticated.policy=authenticated

# ── RFC 9728 Protected Resource Metadata ──────────────────────────────────────
# Quarkus OIDC serves /.well-known/oauth-protected-resource automatically and
# adds WWW-Authenticate: Bearer resource_metadata="<url>" to 401 responses.
quarkus.oidc.resource-metadata.enabled=true
quarkus.oidc.resource-metadata.resource=${EXPECTED_AUDIENCE:http://localhost:8080/mcp}
quarkus.oidc.resource-metadata.scopes=bookmarks:read,bookmarks:write
# Disable forced HTTPS so the demo works on plain http://localhost
quarkus.oidc.resource-metadata.force-https-scheme=false

# ── Logging ────────────────────────────────────────────────────────────────────
# Clean single-line format suited for live-demo screen sharing
quarkus.log.console.format=%d{HH:mm:ss.SSS} %-5p [%c{2.}] %s%e%n
quarkus.log.level=INFO
